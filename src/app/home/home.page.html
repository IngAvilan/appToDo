<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Mis Tareas
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Mis Tareas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-toast [isOpen]="isToastOpen" message="Tarea sin descripción" [duration]="5000" (didDismiss)="setOpen(false)"
    position="top"></ion-toast>

  <div id="container">


    <ion-list>
      <ion-item-sliding *ngFor="let task of tasks">
        <ion-item>
          <ion-label>
            {{task.title}}
          </ion-label>
        </ion-item>
        <ion-item-options>
          <ion-item-option>
            Terminado
          </ion-item-option>
          <ion-item-option color="danger" (click)="deleteTask(task)">Eliminar</ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>



    <ion-fab vertical="bottom" horizontal="end">
      <ion-fab-button (click)="open()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>

  </div>
</ion-content>
