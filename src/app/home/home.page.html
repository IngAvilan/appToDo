<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Mis Tareas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Mis Tareas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-toast 
    [isOpen]="isToastOpen" 
    message="Tarea sin descripción" 
    [duration]="3000" 
    (didDismiss)="setOpen(false)"
    position="top">
  </ion-toast>

  <div id="container">
    <ion-list>
      <!-- Mensaje si no hay tareas -->
      <ion-item *ngIf="tasks.length === 0" lines="none">
        <ion-label class="ion-text-center">
          <p>No tienes tareas pendientes. ¡Buen trabajo!</p>
        </ion-label>
      </ion-item>

      <ion-item-sliding *ngFor="let task of tasks">
        <!-- Lado Izquierdo: Acción de cambiar estado -->
        <ion-item-options side="start">
          <ion-item-option (click)="changeStatus(task)" color="secondary">
            <ion-icon slot="top" name="sync"></ion-icon>
            Estado
          </ion-item-option>
        </ion-item-options>

        <ion-item>
          <ion-label>
            <h2>{{ task.title }}</h2>
            <ion-badge [color]="task.status === 'terminado' ? 'success' : (task.status === 'en curso' ? 'warning' : 'medium')">
              {{ task.status }}
            </ion-badge>
          </ion-label>
        </ion-item>

        <!-- Lado Derecho: Acción de eliminar -->
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="deleteTask(task)">
            <ion-icon slot="top" name="trash"></ion-icon>
            Eliminar
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button (click)="open()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </div>
</ion-content>
